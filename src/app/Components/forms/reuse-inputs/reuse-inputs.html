<div class="flex flex-col gap-1 w-full">

  <!-- TEXT -->
  @if (type === 'text') {
    <p-floatlabel variant="on" class="w-full block">
      <input
        pInputText
        [id]="inputId"
        [formControl]="asFormControl"
        class="w-full rounded-xl border px-4 py-2.5 text-sm transition-all
               duration-200 outline-none focus:ring-2 {{ errorClass }}"
      />
      <label [for]="inputId">
        {{ label }}@if(isRequired){<span class="text-red-500 ml-0.5">*</span>}
      </label>
    </p-floatlabel>
  }

  <!-- EMAIL -->
  @if (type === 'email') {
    <p-floatlabel variant="on" class="w-full block">
      <input
        pInputText
        type="email"
        [id]="inputId"
        [formControl]="asFormControl"
        class="w-full rounded-xl border px-4 py-2.5 text-sm transition-all
               duration-200 outline-none focus:ring-2 {{ errorClass }}"
      />
      <!-- FIX: Added [for] property matching the input target id -->
      <label [for]="inputId">
        {{ label }}@if(isRequired){<span class="text-red-500">*</span>}
      </label>
    </p-floatlabel>
  }

  <!-- PASSWORD -->
  @if (type === 'password') {
    <p-floatlabel variant="on" class="w-full block">
      <p-password
        [inputId]="inputId"
        [feedback]="false"
        [toggleMask]="true"
        [formControl]="asFormControl"
        [inputStyleClass]="'w-full rounded-xl border px-4 py-2.5 text-sm transition-all duration-200 outline-none focus:ring-2 ' + errorClass"
        styleClass="w-full"
      />
      <!-- FIX: PrimeNG structural p-password hooks directly onto its inputId binding -->
      <label [for]="inputId">
        {{ label }}@if(isRequired){<span class="text-red-500 ml-0.5">*</span>}
      </label>
    </p-floatlabel>
  }

  <!-- NUMBER -->
  @if (type === 'number') {
    <p-floatlabel variant="on" class="w-full block">
      <p-inputNumber
        [inputId]="inputId"
        [useGrouping]="false"
        [formControl]="asFormControl"
        [inputStyleClass]="'w-full rounded-xl border px-4 py-2.5 text-sm transition-all duration-200 outline-none focus:ring-2 ' + errorClass"
        styleClass="w-full"
      />
      <label [for]="inputId">
        {{ label }}@if(isRequired){<span class="text-red-500 ml-0.5">*</span>}
      </label>
    </p-floatlabel>
  }

  <!-- DECIMAL -->
  @if (type === 'decimal') {
    <p-floatlabel variant="on" class="w-full block">
      <p-inputNumber
        [inputId]="inputId"
        mode="decimal"
        [minFractionDigits]="2"
        [maxFractionDigits]="4"
        [useGrouping]="false"
        [formControl]="asFormControl"
        [inputStyleClass]="'w-full rounded-xl border px-4 py-2.5 text-sm transition-all duration-200 outline-none focus:ring-2 ' + errorClass"
        styleClass="w-full"
      />
      <label [for]="inputId">
        {{ label }}@if(isRequired){<span class="text-red-500 ml-0.5">*</span>}
      </label>
    </p-floatlabel>
  }

  <!-- TEXTAREA -->
  @if (type === 'textarea') {
    <p-floatlabel variant="on" class="w-full block">
      <textarea
        pInputTextarea
        [id]="inputId"
        [rows]="rows"
        [formControl]="asFormControl"
        class="w-full rounded-xl border px-4 py-2.5 text-sm transition-all
               duration-200 outline-none focus:ring-2 resize-y {{ errorClass }}"
      ></textarea>
      <label [for]="inputId">
        {{ label }}@if(isRequired){<span class="text-red-500 ml-0.5">*</span>}
      </label>
    </p-floatlabel>
  }

  <!-- ERROR MESSAGES -->
  @if (hasError) {
    <div class="flex flex-col gap-0.5 mt-0.5">
      @for (msg of errorMessages; track msg) {
        <p-message severity="error" [text]="msg" styleClass="text-xs" />
      }
    </div>
  }

</div>
