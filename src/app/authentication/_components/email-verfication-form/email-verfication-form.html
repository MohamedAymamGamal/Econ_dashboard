<div class="card flex justify-center">
  <div class="flex flex-col items-center">
    <div class="font-bold text-xl mb-2">Authenticate Your Account</div>
    <p class="text-muted-color block mb-8">Please enter the code sent to your phone.</p>
    <p-inputotp  [(ngModel)]="value" [length]="6" size="small" [integerOnly]="true">
      <ng-template #input let-token let-events="events" let-index="index">
        <input type="text"
               [maxLength]="1"
               (input)="events.input($event)"
               (keydown)="events.keydown($event)"
               [attr.value]="token"
               class="w-8 h-8 text-center p-1 text-sm border rounded" />
        <div *ngIf="index === 3" class="px-1">
          <i class="pi pi-minus"></i>
        </div>
      </ng-template>
    </p-inputotp>

    <div class="flex justify-center mt-8 self-stretch">
      <p-button label="Resend Code" [link]="true" class="p-0" />
      <p-button label="Submit Code" />
    </div>
  </div>
</div>
