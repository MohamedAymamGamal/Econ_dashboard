<div class="flex justify-center items-center h-full pt-32">
  <div class="w-full grid grid-cols-1 gap-5 md:w-3/4">
    <div class="flex justify-center  items-center">
      <img ngSrc="/images/logo.jpg" class="rounded-full " alt="Logo" width="100" height="100" />
    </div>
    <h3 class="text-2xl text-center" >Welcome Back!</h3>
    <p class="text-center  mb-5" >
      Log in to keep your workflow smooth and perform at your best.
    </p>
    <app-login-form></app-login-form>
    <div class="flex justify-center items-center gap-2 text-sm ">
      <p>Don't have an account?</p>

        <a
      routerLink="/authentication/register"
      class="signup-link group flex items-center gap-2 px-4 py-2 rounded-xl border border-transparent
      transition-all duration-200 hover:bg-surface-100 hover:border-surface-300"
      >
      <span class="font-medium transition-all duration-200 group-hover:tracking-wide">
      Create new account
    </span>

      <!-- arrow slides in on hover -->
      <i
        class="pi pi-arrow-right text-xs opacity-0 -translate-x-2 transition-all duration-200
             group-hover:opacity-100 group-hover:translate-x-0 text-primary"
      ></i>

      <!-- icon bounces and rotates on hover -->
      <i
        class="pi pi-user-plus text-lg transition-all duration-300
             group-hover:scale-125 group-hover:-rotate-12 group-hover:text-primary"
        style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);"
      ></i>
      </a>
    </div>

    <div class="flex justify-center items-center text-center gap-2">
      <a routerLink="/authentication/forgot-password" class="signup-link group flex items-center gap-2 px-4 py-2 rounded-xl border border-transparent
          transition-all duration-200 hover:bg-surface-100 hover:border-surface-300">
      <span class="font-medium transition-all duration-200 group-hover:tracking-wide">
      forget password
    </span>
        <!-- arrow slides in on hover -->

        <i
          class="pi pi-arrow-right text-xs opacity-0 -translate-x-2 transition-all duration-200
             group-hover:opacity-100 group-hover:translate-x-0 text-primary"
        ></i>
        <!-- icon bounces and rotates on hover -->

        <i
          class="pi pi-key text-lg transition-all duration-300
             group-hover:scale-125 group-hover:-rotate-12 group-hover:text-primary"
          style="transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);"
        ></i>

      </a>

    </div>
  </div>
</div>
